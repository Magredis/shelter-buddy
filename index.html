<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0e14">
<title>Миклатон · v3</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0e14;--bg2:#12161f;--bg3:#1a1f2b;--bg4:#242b3a;
  --card:#151a24;--card2:#1c2230;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#e8ecf4;--text2:#6b7a94;--text3:#3d4a5f;
  --green:#00d4aa;--green2:#00b894;
  --red:#ff4757;--orange:#ffa502;--blue:#3498ff;
  --font:'Outfit',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --r:16px;--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased}
.app{height:100%;max-width:500px;margin:0 auto;display:flex;flex-direction:column;background:var(--bg)}

.hdr{padding:12px 18px 10px;padding-top:calc(12px + var(--safe-t));background:var(--bg2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 4px 14px rgba(0,212,170,0.2)}
.logo h1{font-size:18px;font-weight:800;letter-spacing:-.4px;line-height:1}
.logo small{font-size:9px;color:var(--text2);font-family:var(--mono);letter-spacing:.8px}
.hdr-btn{padding:7px 14px;border-radius:10px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;display:none;align-items:center;gap:5px}
.hdr-btn:active{background:var(--bg4)}

.main{flex:1;overflow:hidden;display:flex;flex-direction:column}

.locate{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.locate p{font-size:15px;color:var(--text2);margin-bottom:24px;line-height:1.6}
.go-btn{display:inline-flex;align-items:center;gap:10px;padding:18px 40px;border-radius:60px;border:none;background:linear-gradient(135deg,var(--green),var(--green2));color:#000;font-family:var(--font);font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 8px 32px rgba(0,212,170,0.3);transition:transform .15s}
.go-btn:active{transform:scale(.96)}
.locate .sub{margin-top:14px;font-size:11px;color:var(--text3);line-height:1.5}

.ld{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center}
.sp{width:44px;height:44px;border:3px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.ld p{font-size:14px;color:var(--text2)}

.err{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.err .ei{font-size:44px;margin-bottom:10px}
.err p{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.err button{padding:12px 28px;border-radius:14px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer}

.map-area{flex-shrink:0;position:relative;background:#111}
.map-area iframe{width:100%;height:50vh;min-height:280px;border:none;display:block}
.map-badge{position:absolute;top:10px;left:10px;background:rgba(11,14,20,0.88);backdrop-filter:blur(8px);border:1px solid var(--border2);border-radius:10px;padding:7px 12px;font-size:11px;color:var(--text2);font-weight:600;display:flex;align-items:center;gap:6px;max-width:calc(100% - 100px);overflow:hidden}
.map-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(0,212,170,0.6);flex-shrink:0}
.map-ext{position:absolute;top:10px;right:10px;padding:7px 12px;border-radius:10px;background:rgba(11,14,20,0.88);backdrop-filter:blur(8px);border:1px solid var(--border2);color:var(--text);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;text-decoration:none}
.map-grad{position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,var(--bg));pointer-events:none}

.list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px calc(16px + var(--safe-b))}
.list::-webkit-scrollbar{width:3px}
.list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.list-hdr{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.5px;margin-bottom:8px;text-transform:uppercase}

.sh{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;margin-bottom:7px;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:12px}
.sh:active{background:var(--card2);transform:scale(.99)}
.sh.top{border-color:rgba(0,212,170,0.3);background:linear-gradient(135deg,rgba(0,212,170,0.05),transparent)}
.sh-n{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sh-n .badge{font-size:8px;font-weight:800;color:#000;background:var(--green);padding:2px 6px;border-radius:4px;letter-spacing:.5px}
.sh-n .badge-gov{font-size:8px;font-weight:800;color:#000;background:var(--orange);padding:2px 6px;border-radius:4px;letter-spacing:.5px}
.sh-d{font-size:11px;color:var(--text2);margin-top:2px}
.sh-go{font-size:12px;color:var(--green);font-weight:600;margin-top:4px}

.foot{text-align:center;padding:10px;font-size:9px;color:var(--text3);line-height:1.5}
.foot a{color:var(--text2);text-decoration:none}

@media(max-width:400px){
  .hdr{padding:10px 14px 8px;padding-top:calc(10px + var(--safe-t))}
  .logo h1{font-size:17px}
  .map-area iframe{height:44vh;min-height:250px}
  .sh{padding:11px 12px;gap:10px}
  .sh-n{font-size:13px}
}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="logo">
      <div class="logo-mark">🛡️</div>
      <div><h1>Миклатон</h1><small>SHELTER FINDER v3.0</small></div>
    </div>
    <button class="hdr-btn" id="refreshBtn" onclick="go()">🔄 Обновить</button>
  </div>
  <div class="main" id="main">
    <div class="locate">
      <p>Покажем укрытия рядом с тобой<br>на карте с маршрутами</p>
      <button class="go-btn" onclick="go()">📍 Найти укрытия</button>
      <div class="sub">Google Maps + GovMap (Пикуд ха-Ореф)</div>
    </div>
  </div>
</div>

<script>
(function(){
var S={lat:null,lng:null,city:''};
var M=document.getElementById('main');

function showLoad(msg){M.innerHTML='<div class="ld"><div class="sp"></div><p>'+msg+'</p></div>'}
function showErr(msg){M.innerHTML='<div class="err"><div class="ei">😕</div><p>'+msg+'</p><button onclick="go()">🔄 Ещё раз</button></div>'}

function revGeo(lat,lng,cb){
  fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lng+'&zoom=14&accept-language=ru')
    .then(function(r){return r.json()})
    .then(function(d){cb(d.address&&(d.address.city||d.address.town||d.address.village||d.address.suburb)||'')})
    .catch(function(){cb('')});
}

function render(){
  document.getElementById('refreshBtn').style.display='flex';

  /* Google Maps embed — search מקלט centered on user at zoom 16 */
  var embedUrl='https://maps.google.com/maps?q='+encodeURIComponent('מקלט')+'+near+'+S.lat+','+S.lng+'&ll='+S.lat+','+S.lng+'&z=16&output=embed';

  /* Google Maps full search URL */
  var gFullUrl='https://www.google.com/maps/search/'+encodeURIComponent('מקלט')+'/@'+S.lat+','+S.lng+',16z';

  /* GovMap external link (user opens in browser — works properly outside iframe) */
  var govUrl='https://www.govmap.gov.il/?lay=417&c='+S.lat+','+S.lng+'&z=7&b=0';

  var h='';

  /* === MAP — Google Maps embed with מקלט search === */
  h+='<div class="map-area">';
  h+='<iframe src="'+embedUrl+'" loading="lazy" referrerpolicy="no-referrer"></iframe>';
  h+='<div class="map-badge"><div class="dot"></div>מקלט'+(S.city?' · '+S.city:'')+'</div>';
  h+='<a class="map-ext" href="'+gFullUrl+'" target="_blank">↗ Карта</a>';
  h+='<div class="map-grad"></div>';
  h+='</div>';

  /* === LIST === */
  h+='<div class="list">';
  h+='<div class="list-hdr">Маршруты · нажми для навигации</div>';

  /* Main: מקלט search in Google Maps */
  h+='<div class="sh top" onclick="window.open(\''+gFullUrl+'\',\'_blank\')">';
  h+='<div style="flex:1">';
  h+='<div class="sh-n">🛡️ Миклаты рядом <span class="badge">МАРШРУТЫ</span></div>';
  h+='<div class="sh-d">Google Maps покажет ближайшие с навигацией</div>';
  h+='<div class="sh-go">Открыть →</div>';
  h+='</div></div>';

  /* GovMap — official Pikud HaOref shelters */
  h+='<div class="sh" onclick="window.open(\''+govUrl+'\',\'_blank\')">';
  h+='<div style="flex:1">';
  h+='<div class="sh-n">🗺️ GovMap — все миклаты <span class="badge-gov">ОФИЦИАЛЬНЫЕ</span></div>';
  h+='<div class="sh-d">Карта Пикуд ха-Ореф, слой 417</div>';
  h+='<div class="sh-go">Открыть GovMap →</div>';
  h+='</div></div>';

  /* Additional searches */
  var links=[
    {q:'חניון תת קרקעי',icon:'🅿️',name:'Подземные парковки',desc:'Могут служить укрытием'},
    {q:'מרכז קהילתי',icon:'🏛️',name:'Общественные центры',desc:'Часто есть защищённое пространство'},
    {q:'בית חולים',icon:'🏥',name:'Больницы',desc:'Есть защищённые этажи'}
  ];
  links.forEach(function(l){
    var u='https://www.google.com/maps/search/'+encodeURIComponent(l.q)+'/@'+S.lat+','+S.lng+',15z';
    h+='<div class="sh" onclick="window.open(\''+u+'\',\'_blank\')">';
    h+='<div style="flex:1">';
    h+='<div class="sh-n">'+l.icon+' '+l.name+'</div>';
    h+='<div class="sh-d">'+l.desc+'</div>';
    h+='<div class="sh-go">Google Maps →</div>';
    h+='</div></div>';
  });

  h+='<div class="foot">Карта: Google Maps (поиск «מקלט»)<br>Официальные данные: <a href="https://www.govmap.gov.il/?lay=417" target="_blank">GovMap</a> (Пикуд ха-Ореф)<br>⚠️ Не заменяет официальное приложение</div>';
  h+='</div>';

  M.innerHTML=h;
}

/* ===== MAIN ===== */
window.go=function(){
  if(!navigator.geolocation){showErr('GPS недоступен');return}
  showLoad('Определяю координаты...');

  navigator.geolocation.getCurrentPosition(function(pos){
    S.lat=pos.coords.latitude;
    S.lng=pos.coords.longitude;
    showLoad('Загружаю карту...');
    revGeo(S.lat,S.lng,function(c){
      S.city=c;
      render();
    });
  },function(e){
    var m={1:'Доступ запрещён.<br>Разреши геолокацию в настройках.',2:'Не удалось определить место.',3:'Таймаут — попробуй снова.'};
    showErr(m[e.code]||'Ошибка GPS');
  },{enableHighAccuracy:true,timeout:12000,maximumAge:0});
};
})();
</script>
</body>
</html>
